<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>JoJo's World Clock</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
  --bg: #000000;
  --primary: #ffffff;
  --secondary: #8e8e93;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--primary);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-size: 28px;
  font-weight: 600;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* BIG TITLE (same as time) */
.title {
  font-size: 52px;
  font-weight: 700;
  margin-bottom: 30px;
}

/* City */
.city {
  font-size: 36px;
  margin-bottom: 4px;
}

/* Date + offset */
.meta {
  font-size: 16px;
  color: var(--secondary);
  margin-bottom: 10px;
}

/* Time container */
.time {
  font-size: 52px;
  font-weight: 600;
  letter-spacing: 1.5px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}

/* Digit animation */
.digit {
  display: inline-block;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.digit.change {
  transform: translateY(-8px);
  opacity: 0;
}

/* Divider */
.divider {
  height: 1px;
  background: #1c1c1e;
  margin: 30px 0;
}
</style>

</head>

<body>

<div id="splash"> JoJo's World Clock</div>

<div class="container" id="app" style="display:none;">

  <div class="title">JoJo’s World Clock</div>

  <div>
    <div class="city">🇺🇸 Los Angeles</div>
    <div class="meta" id="meta-la"></div>
    <div class="time" id="la"></div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="city">🇹🇼 Taipei</div>
    <div class="meta" id="meta-taipei"></div>
    <div class="time" id="taipei"></div>
  </div>

</div>

<script>
function formatParts(date, timeZone) {
  const formatter = new Intl.DateTimeFormat("en-US", {
    timeZone,
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  });

  return formatter.formatToParts(date)
    .map(p => p.value)
    .join('');
}

function formatDate(date, timeZone) {
  return new Intl.DateTimeFormat("en-US", {
    timeZone,
    weekday: "long",
    month: "long",
    day: "numeric"
  }).format(date);
}

/* Digit-by-digit render */
function renderDigits(container, newTime) {
  const oldDigits = container.querySelectorAll(".digit");

  // First render
  if (oldDigits.length === 0) {
    container.innerHTML = newTime.split("").map(c =>
      `<span class="digit">${c}</span>`
    ).join("");
    return;
  }

  const newChars = newTime.split("");

  newChars.forEach((char, i) => {
    const digit = oldDigits[i];

    if (!digit) return;

    if (digit.textContent !== char) {
      digit.classList.add("change");

      setTimeout(() => {
        digit.textContent = char;
        digit.classList.remove("change");
      }, 120);
    }
  });
}

/* Time difference */
function getOffsetHours(date, tz1, tz2) {
  const d1 = new Date(date.toLocaleString("en-US", { timeZone: tz1 }));
  const d2 = new Date(date.toLocaleString("en-US", { timeZone: tz2 }));

  return Math.round((d2 - d1) / (1000 * 60 * 60));
}

function update() {
  const now = new Date();

  const laTime = formatParts(now, "America/Los_Angeles");
  const taipeiTime = formatParts(now, "Asia/Taipei");

  renderDigits(document.getElementById("la"), laTime);
  renderDigits(document.getElementById("taipei"), taipeiTime);

  const laDate = formatDate(now, "America/Los_Angeles");
  const taipeiDate = formatDate(now, "Asia/Taipei");

  const diff = getOffsetHours(now, "America/Los_Angeles", "Asia/Taipei");

  document.getElementById("meta-la").textContent =
    `${laDate} • ${diff > 0 ? "+" : ""}${diff} hrs vs Taipei`;

  document.getElementById("meta-taipei").textContent =
    `${taipeiDate} • ${-diff > 0 ? "+" : ""}${-diff} hrs vs LA`;
}

setInterval(update, 1000);
update();

/* Splash */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 600);
});
</script>

</body>
</html>
