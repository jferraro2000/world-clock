<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>JoJo's World Clock</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
  --bg: #000;
  --primary: #fff;
  --secondary: #8e8e93;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--primary);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-size: 28px;
  font-weight: 600;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Title */
.title {
  font-size: 52px;
  font-weight: 700;
  margin-bottom: 25px;
}

/* City */
.city {
  font-size: 34px;
  margin-bottom: 4px;
}

/* Meta */
.meta {
  font-size: 15px;
  color: var(--secondary);
  margin-bottom: 10px;
}

/* Time container */
.time {
  display: flex;
  justify-content: center;
  gap: 2px;
  font-size: 50px;
  font-weight: 600;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}

/* Digit slot */
.digit-slot {
  position: relative;
  width: 0.6em;
  height: 1.2em;
  overflow: hidden;
}

/* Digit column */
.digit-column {
  position: absolute;
  top: 0;
  left: 0;
  transition: transform 0.4s ease-in-out;
}

/* Each digit */
.digit {
  height: 1.2em;
}

/* Divider */
.divider {
  height: 1px;
  background: #1c1c1e;
  margin: 25px 0;
}
</style>

</head>

<body>

<div id="splash"> JoJo's World Clock</div>

<div class="container" id="app" style="display:none;">

  <div class="title">JoJo’s World Clock</div>

  <div>
    <div class="city">🇺🇸 Los Angeles</div>
    <div class="meta" id="meta-la"></div>
    <div class="time" id="la"></div>
  </div>

  <div class="divider"></div>

  <div>
    <div class="city">🇹🇼 Taipei</div>
    <div class="meta" id="meta-taipei"></div>
    <div class="time" id="taipei"></div>
  </div>

</div>

<script>
function buildDigitSlot(char) {
  if (!/[0-9]/.test(char)) {
    return `<span>${char}</span>`;
  }

  let digits = "";
  for (let i = 0; i <= 9; i++) {
    digits += `<div class="digit">${i}</div>`;
  }

  return `
    <div class="digit-slot">
      <div class="digit-column" data-value="${char}">
        ${digits}
      </div>
    </div>
  `;
}

function renderTime(container, timeStr) {
  const existing = container.querySelectorAll(".digit-column");

  // First render
  if (existing.length === 0) {
    container.innerHTML = timeStr.split("").map(buildDigitSlot).join("");
    return;
  }

  const chars = timeStr.split("");
  let colIndex = 0;

  chars.forEach((char, i) => {
    if (!/[0-9]/.test(char)) return;

    const col = existing[colIndex];
    const newVal = parseInt(char);
    const oldVal = parseInt(col.dataset.value);

    if (newVal !== oldVal) {
      col.style.transform = `translateY(-${newVal * 1.2}em)`;
      col.dataset.value = newVal;
    }

    colIndex++;
  });
}

function formatTime(date, tz) {
  return new Intl.DateTimeFormat("en-US", {
    timeZone: tz,
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  }).format(date);
}

function formatDate(date, tz) {
  return new Intl.DateTimeFormat("en-US", {
    timeZone: tz,
    weekday: "long",
    month: "long",
    day: "numeric"
  }).format(date);
}

function getOffset(date, tz1, tz2) {
  const d1 = new Date(date.toLocaleString("en-US", { timeZone: tz1 }));
  const d2 = new Date(date.toLocaleString("en-US", { timeZone: tz2 }));
  return Math.round((d2 - d1) / 3600000);
}

function update() {
  const now = new Date();

  const la = formatTime(now, "America/Los_Angeles");
  const tp = formatTime(now, "Asia/Taipei");

  renderTime(document.getElementById("la"), la);
  renderTime(document.getElementById("taipei"), tp);

  const diff = getOffset(now, "America/Los_Angeles", "Asia/Taipei");

  document.getElementById("meta-la").textContent =
    `${formatDate(now, "America/Los_Angeles")} • ${diff > 0 ? "+" : ""}${diff} hrs vs Taipei`;

  document.getElementById("meta-taipei").textContent =
    `${formatDate(now, "Asia/Taipei")} • ${-diff > 0 ? "+" : ""}${-diff} hrs vs LA`;
}

setInterval(update, 1000);
update();

/* Splash */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 600);
});
</script>

</body>
</html>
