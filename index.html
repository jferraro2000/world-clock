<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>World Clock</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<style>
:root {
  --bg: #000000;
  --primary: #ffffff;
  --secondary: #8e8e93;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--primary);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
  text-align: center;
}

/* Splash */
#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-size: 28px;
  font-weight: 600;
}

/* Container */
.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* City Block */
.city-block {
  margin-bottom: 40px;
}

/* City */
.city {
  font-size: 36px;
  margin-bottom: 6px;
}

/* Date */
.date {
  font-size: 16px;
  color: var(--secondary);
  margin-bottom: 10px;
}

/* Time */
.time {
  font-size: 56px;
  font-weight: 600;
  letter-spacing: 2px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;

  display: inline-block;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

/* Animation states */
.time.fade-out {
  opacity: 0;
  transform: translateY(5px);
}

.time.fade-in {
  opacity: 1;
  transform: translateY(0);
}

/* Divider */
.divider {
  height: 1px;
  background: #1c1c1e;
  margin: 30px 0;
}
</style>

</head>

<body>

<div id="splash"> World Clock</div>

<div class="container" id="app" style="display:none;">

  <div class="city-block">
    <div class="city">🇺🇸 Los Angeles</div>
    <div class="date" id="date-la"></div>
    <div class="time" id="la"></div>
  </div>

  <div class="divider"></div>

  <div class="city-block">
    <div class="city">🇹🇼 Taipei</div>
    <div class="date" id="date-taipei"></div>
    <div class="time" id="taipei"></div>
  </div>

</div>

<script>
function formatDate(date, timeZone) {
  return new Intl.DateTimeFormat("en-US", {
    timeZone: timeZone,
    weekday: "long",
    month: "long",
    day: "numeric"
  }).format(date);
}

function formatTime(date, timeZone) {
  return new Intl.DateTimeFormat("en-US", {
    timeZone: timeZone,
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  }).format(date);
}

function animateUpdate(element, newValue) {
  element.classList.add("fade-out");

  setTimeout(() => {
    element.textContent = newValue;
    element.classList.remove("fade-out");
    element.classList.add("fade-in");

    setTimeout(() => {
      element.classList.remove("fade-in");
    }, 200);

  }, 100);
}

function updateTime() {
  const now = new Date();

  const laTime = formatTime(now, "America/Los_Angeles");
  const taipeiTime = formatTime(now, "Asia/Taipei");

  const laDate = formatDate(now, "America/Los_Angeles");
  const taipeiDate = formatDate(now, "Asia/Taipei");

  animateUpdate(document.getElementById("la"), laTime);
  animateUpdate(document.getElementById("taipei"), taipeiTime);

  document.getElementById("date-la").textContent = laDate;
  document.getElementById("date-taipei").textContent = taipeiDate;
}

setInterval(updateTime, 1000);
updateTime();

/* Splash */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
    document.getElementById("app").style.display = "block";
  }, 700);
});
</script>

</body>
</html>
